name: dreambook
description: Baby daybook for new parents — privacy-first, family share.
publish_to: 'none'
version: 0.1.0+10001

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State (hand-rolled providers in Plan A — codegen deferred to Plan B)
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.2.3

  # Persistence (encrypted local DB)
  sqflite_sqlcipher: ^3.4.0
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.5.5

  # i18n
  intl: ^0.20.0

  # Notifications (inexact only — never request SCHEDULE_EXACT_ALARM)
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^3.0.0

  # Utilities
  uuid: ^4.5.3
  path: ^1.9.0
  collection: ^1.19.0

  # Crypto (Plan C-1) — native AES-GCM / Argon2id / Ed25519 / BLAKE2b
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2

  # Supabase (Plan C-2) — anonymous auth + REST + Realtime over ws
  supabase_flutter: ^2.9.0

  # Subscriptions (Plan D) — RevenueCat in-app purchases
  purchases_flutter: ^8.7.7

  # PDF generation + share (Plan E) — Visit Summary PDF
  pdf: ^3.11.0
  printing: ^5.13.0

  # Share invite codes + Visit Summary PDF via system share sheet
  share_plus: ^10.0.0

  # Cross-app bridge (Plan F) — launch DreamBaby from DreamBook
  url_launcher: ^6.3.1

  # In-app review (Play Store / App Store native rating prompt)
  in_app_review: ^2.0.9

  # Background sync (Plan C-2 BG) — WorkManager periodic + connectivity watch
  workmanager: ^0.9.0
  connectivity_plus: ^6.1.1

  # Compression (Plan C-2 SY-10) — zstd for versioned CryptoEnvelope v2
  zstandard: ^1.2.0

  # Observability (P2.33 DV-6) — opt-in crash reporting with PII scrubber
  sentry_flutter: ^8.11.0
  bip39: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.3   # in-memory DB for tests

flutter:
  uses-material-design: true
  generate: true   # triggers `flutter gen-l10n` on build
  assets:
    - assets/.env
  fonts:
    - family: IBMPlexSansThai
      fonts:
        - asset: assets/fonts/IBMPlexSansThai-Regular.ttf
        - asset: assets/fonts/IBMPlexSansThai-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansThai-SemiBold.ttf
          weight: 600
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
