name: compact_encrypted_rows
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  compact:
    runs-on: ubuntu-latest
    env:
      SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
    steps:
      - name: Invoke compact_encrypted_rows Edge Function
        run: |
          curl -fsS -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "$SUPABASE_FUNCTIONS_URL/compact_encrypted_rows"
