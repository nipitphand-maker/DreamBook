name: CI

on:
  push:
    branches: [main, 'hardening/**', 'feat/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
      - run: flutter pub get
      - name: Create placeholder assets/.env (gitignored at runtime)
        run: mkdir -p assets && touch assets/.env
      - run: flutter analyze --no-fatal-infos

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
      - run: flutter pub get
      - run: flutter test --tags unit

  lint-migrations:
    name: Migration Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
      - run: flutter pub get
      - run: dart run tool/lint_migrations.dart
      - name: Check no exact alarms
        run: bash tool/check_no_exact_alarms.sh

  schema-diff:
    name: Schema Diff (staging)
    runs-on: ubuntu-latest
    if: ${{ vars.STAGING_SUPABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
      - run: flutter pub get
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://supabase.com/install.sh | sh
          echo "$HOME/.supabase/bin" >> $GITHUB_PATH
      - run: dart run tool/schema_diff.dart
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

  integration:
    name: Integration Tests (Ring 2)
    runs-on: ubuntu-latest
    if: ${{ vars.STAGING_SUPABASE_URL != '' }}
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase
        run: |
          supabase start
          echo "SUPABASE_URL=$(supabase status --output env | grep SUPABASE_URL | cut -d= -f2)" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status --output env | grep SUPABASE_ANON_KEY | cut -d= -f2)" >> $GITHUB_ENV
      - run: flutter pub get
      - run: flutter test --tags integration
      - name: Stop Supabase
        if: always()
        run: supabase stop

  pgtap:
    name: pgTAP Tests
    runs-on: ubuntu-latest
    if: ${{ vars.STAGING_SUPABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Install pg_prove
        run: |
          sudo apt-get install -y cpanminus
          sudo cpanm --notest TAP::Parser::SourceHandler::pgTAP
      - name: Start local Supabase
        run: supabase start
      - run: bash supabase/tests/run.sh
      - name: Stop Supabase
        if: always()
        run: supabase stop
